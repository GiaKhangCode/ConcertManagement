<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Trang quản lý phê duyệt sự kiện dành cho Admin trên Ve'ryGood.">
    <title>Ve'ryGood | Quản Lý Phê Duyệt</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:wght@300;400;500;600&family=Unbounded:wght@600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="css/style.css">
    <link rel="icon" type="image/png" href="assets/test.png">
    <style>
        /* === ADMIN APPROVAL PAGE STYLES === */
        .admin-page-header {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid var(--border-subtle);
            border-radius: 20px;
            padding: 1.5rem 2.5rem;
            backdrop-filter: blur(10px);
        }

        .section-title {
            text-align: left;
            margin-bottom: 2.5rem;
            font-size: 1.2rem;
            color: var(--accent-secondary);
            letter-spacing: 2px;
            font-family: 'Unbounded';
            display: flex;
            align-items: center;
            gap: 15px;
            text-shadow: 0 0 15px rgba(0, 229, 255, 0.3);
        }

        .section-title::after {
            content: '';
            flex: 1;
            height: 1px;
            background: linear-gradient(90deg, var(--border-subtle), transparent);
        }

        .pending-count .dot {
            width: 10px;
            height: 10px;
            background: var(--accent-secondary);
            border-radius: 50%;
            box-shadow: 0 0 10px var(--glow-cyan);
            animation: pulse 2s ease-in-out infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; transform: scale(1); }
            50% { opacity: 0.5; transform: scale(0.8); }
        }

        /* === EVENT APPROVAL CARDS === */
        .approval-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
            gap: 2.5rem;
            margin-bottom: 5rem;
        }

        /* Override/Enhance style.css event-card for Admin */
        .event-card.admin-view {
            height: auto;
            border-color: rgba(255, 255, 255, 0.1);
        }
        
        /* Giao diện Body Card Admin */
        .admin-view .card-body {
            padding: 2rem;
            display: flex;
            flex-direction: column;
            gap: 1.5rem;
        }

        .admin-view .card-meta-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 1rem;
            margin-bottom: 1.5rem;
            padding: 1rem;
            background: rgba(0, 0, 0, 0.2);
            border-radius: 12px;
            border: 1px solid var(--border-subtle);
        }

        .meta-item {
            display: flex;
            flex-direction: column;
            gap: 4px;
        }

        .meta-label {
            font-size: 0.65rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: var(--text-muted);
        }

        .meta-value {
            font-size: 0.85rem;
            font-weight: 500;
            color: #fff;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .admin-description {
            font-size: 0.85rem;
            color: var(--text-muted);
            line-height: 1.6;
            margin-bottom: 1.5rem;
            display: -webkit-box;
            -webkit-line-clamp: 3;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }

        .organizer-info {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 2rem;
            padding-top: 1.5rem;
            border-top: 1px solid var(--border-subtle);
        }

        .organizer-avatar {
            width: 32px;
            height: 32px;
            background: var(--accent-primary);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.8rem;
            font-weight: 700;
            color: #fff;
        }

        .organizer-name {
            font-size: 0.9rem;
            font-weight: 500;
            color: var(--text-main);
        }

        /* === ACTION BUTTONS === */
        .card-actions {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 0.8rem;
            margin-top: auto;
        }

        .admin-btn {
            padding: 0.8rem 1rem;
            border-radius: 12px;
            font-family: 'Be Vietnam Pro', sans-serif;
            font-weight: 600;
            font-size: 0.85rem;
            border: 1px solid transparent;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.16, 1, 0.3, 1);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .btn-approve {
            background: var(--status-live);
            color: #000;
            grid-column: span 1;
        }

        .btn-approve:hover:not(:disabled) {
            box-shadow: 0 0 25px rgba(0, 255, 136, 0.4);
            transform: translateY(-2px);
            filter: brightness(1.1);
        }

        .btn-reject {
            background: rgba(255, 51, 102, 0.1);
            color: #ff3366;
            border: 1px solid rgba(255, 51, 102, 0.2);
        }

        .btn-reject:hover:not(:disabled) {
            background: #ff3366;
            color: #fff;
            box-shadow: 0 0 20px rgba(255, 51, 102, 0.3);
            transform: translateY(-2px);
        }

        .btn-feature {
            grid-column: span 2;
            background: linear-gradient(90deg, #00e5ff, #8a2be2);
            color: #fff;
            border: none;
            box-shadow: 0 4px 15px rgba(0, 229, 255, 0.2);
        }

        .btn-feature:hover:not(:disabled) {
            box-shadow: 0 6px 25px rgba(0, 229, 255, 0.4);
            transform: translateY(-2px);
            filter: brightness(1.1);
        }

        .btn-edit {
            grid-column: span 1;
            background: rgba(255, 255, 255, 0.05);
            color: #fff;
            border: 1px solid var(--border-subtle);
        }

        .btn-edit:hover:not(:disabled) {
            background: rgba(255, 255, 255, 0.1);
            border-color: rgba(255, 255, 255, 0.3);
        }

        .btn-delete {
            grid-column: span 1;
            background: rgba(255, 51, 102, 0.05);
            color: #ff3366;
            border: 1px solid rgba(255, 51, 102, 0.1);
        }

        .btn-delete:hover:not(:disabled) {
            background: rgba(255, 51, 102, 0.15);
            border-color: rgba(255, 51, 102, 0.3);
        }

        /* === PROCESSED STATE === */
        .admin-view.processed {
            opacity: 0.5;
            filter: grayscale(0.5);
            pointer-events: none;
        }

        .status-overlay {
            position: absolute;
            inset: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            background: rgba(7, 7, 10, 0.6);
            backdrop-filter: blur(4px);
            z-index: 10;
            opacity: 0;
            transition: opacity 0.3s;
            border-radius: 16px;
        }

        .processed .status-overlay {
            opacity: 1;
        }

        .status-msg {
            padding: 1rem 2rem;
            border-radius: 50px;
            font-weight: 700;
            font-family: 'Unbounded';
            font-size: 1rem;
            transform: translateY(20px);
            transition: transform 0.4s cubic-bezier(0.16, 1, 0.3, 1);
        }

        .processed .status-msg {
            transform: translateY(0);
        }

        .msg-approved { background: #00ff88; color: #000; box-shadow: 0 0 30px rgba(0, 255, 136, 0.4); }
        .msg-rejected { background: #ff3366; color: #fff; box-shadow: 0 0 30px rgba(255, 51, 102, 0.4); }

        /* === TOAST === */
        .toast {
            position: fixed;
            bottom: 40px;
            left: 50%;
            transform: translateX(-50%) translateY(100px);
            background: rgba(10, 10, 15, 0.9);
            backdrop-filter: blur(20px);
            border: 1px solid var(--accent-secondary);
            padding: 1rem 2.5rem;
            border-radius: 50px;
            z-index: 10000;
            opacity: 0;
            transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1);
            color: #fff;
            font-weight: 600;
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
        }

        .toast.show {
            transform: translateX(-50%) translateY(0);
            opacity: 1;
        }

        /* Animations */
        @keyframes drift {
            0% { transform: translate(0, 0) scale(1); }
            100% { transform: translate(-5%, 10%) scale(1.1); }
        }

        @media (max-width: 768px) {
            .approval-grid { grid-template-columns: 1fr; }
            .admin-hero { padding: 2rem; }
        }
    </style>
</head>
<body>
    <div class="custom-cursor"></div>
    <div class="bg-mesh primary-mesh"></div>
    <div class="bg-mesh secondary-mesh"></div>

    <header class="navbar">
        <a href="index.html" style="text-decoration:none; color:inherit;"><div class="logo">Ve'ry<span class="neon-text">Good</span></div></a>
        <div class="nav-center">
            <div class="search-bar">
                <i class="fa fa-search"></i>
                <input type="text" placeholder="Tìm kiếm sự kiện..." id="searchInput">
            </div>
        </div>
        <div class="nav-links">
            <a href="index.html" class="nav-btn">Trang Chủ</a>
            <a href="admin-approval.html" style="display:none;" id="adminNav" class="nav-btn active">Duyệt Sự Kiện</a>
            <a href="event-management.html" style="display:none;" id="revenueNav" class="nav-btn">Quản Lý Sự Kiện</a>
            <a href="admin-create.html" style="display:none;" id="createEventNav" class="nav-btn">Tạo Sự Kiện</a>
            
            <div class="account-dropdown" id="accountDropdown" style="display:none;">
                <button class="btn btn-account">
                    <i class="fa fa-user-circle"></i>
                    <span id="userNameDropdown">Tài khoản</span>
                    <i class="fa fa-chevron-down" style="font-size: 0.7rem; margin-left: 5px; opacity: 0.7;"></i>
                </button>
                <div class="dropdown-content">
                    <a href="profile.html"><i class="fa fa-user"></i> Hồ sơ của tôi</a>
                    <div class="dropdown-divider"></div>
                    <a href="#" onclick="logout()" class="logout-item"><i class="fa fa-sign-out-alt"></i> Đăng xuất</a>
                </div>
            </div>
            <a href="auth.html" class="btn btn-outline small" id="authBtn">Đăng Nhập</a>
        </div>
    </header>


    <main class="container" style="padding-top: 2rem;">
        <!-- Tối giản hóa: Thay Banner lớn bằng tiêu đề và Badge tích hợp -->
        <div class="admin-page-header fade-up" style="display: flex; align-items: center; justify-content: space-between; margin-bottom: 3rem;">
            <div style="display: flex; align-items: center; gap: 1rem;">
                <h1 class="neon-text" style="font-size: 1.8rem; font-family: 'Unbounded'; margin: 0;">KIỂM DUYỆT</h1>
                <div class="pending-count-badge" id="pendingCounter" style="display: flex; align-items: center; gap: 8px; background: rgba(0, 229, 255, 0.1); border: 1px solid rgba(0, 229, 255, 0.2); padding: 5px 15px; border-radius: 50px; font-size: 0.85rem; color: var(--accent-secondary);">
                    <span class="dot" style="width: 8px; height: 8px; background: var(--accent-secondary); border-radius: 50%; display: inline-block; box-shadow: 0 0 10px var(--accent-secondary); animation: pulse 2s infinite;"></span>
                    <span id="pendingCountText">Đang quét...</span>
                </div>
            </div>
            
            <div class="header-actions" style="display: flex; gap: 10px;">
                <button class="btn btn-outline small" onclick="location.reload()"><i class="fa fa-sync-alt"></i> Làm mới</button>
            </div>
        </div>

        <!-- Approval Grid Section -->
        <section class="events-section fade-up stagger-1">
            <h2 class="section-title">CHỜ PHÊ DUYỆT</h2>
            <div class="approval-grid" id="approvalGrid">
                <div class="loading-spinner"><div class="spinner"></div></div>

        </section>

        <!-- Tối giản hóa: Banner nổi bật thay bằng tiêu đề Section sạch sẽ -->
        <div style="margin-top: 5rem; border-top: 1px solid var(--border-subtle); padding-top: 3rem;"></div>

        <!-- Feature Grid Section -->
        <section class="events-section fade-up stagger-1">
            <h2 class="section-title">SỰ KIỆN NỔI BẬT (HERO)</h2>
            <div class="approval-grid" id="featureGrid">
                <div class="loading-spinner"><div class="spinner"></div></div>
            </div>

    <!-- Toast Notification -->
    <div class="toast" id="toast"></div>

    <footer>
        <div class="copyright">© 2026 Ve'ryGood. All rights reserved.</div>
    </footer>

    <script>
        // Custom cursor
        const cursor = document.querySelector('.custom-cursor');
        document.addEventListener('mousemove', (e) => {
            cursor.style.left = e.clientX + 'px';
            cursor.style.top = e.clientY + 'px';
        });

        function attachCursorEvents(els) {
            els.forEach(el => {
                el.addEventListener('mouseenter', () => {
                    cursor.style.transform = 'translate(-50%, -50%) scale(2.5)';
                    cursor.style.background = 'transparent';
                    cursor.style.border = '1px solid white';
                });
                el.addEventListener('mouseleave', () => {
                    cursor.style.transform = 'translate(-50%, -50%) scale(1)';
                    cursor.style.background = '#fff';
                    cursor.style.border = 'none';
                });
            });
        }

        // Toast notification
        function showToast(message, type = 'success') {
            const toast = document.getElementById('toast');
            toast.className = `toast ${type}`;
            toast.innerHTML = `${type === 'success' ? '✅' : '❌'} ${message}`;
            toast.classList.add('show');
            setTimeout(() => toast.classList.remove('show'), 3500);
        }

        // Kiểm tra quyền truy cập & Đồng bộ Header (Sử dụng logic chuẩn từ script.js)
        document.addEventListener('DOMContentLoaded', () => {
            const currentUser = localStorage.getItem('stellar_user');
            const rolesStr = localStorage.getItem('stellar_roles');
            const token = localStorage.getItem('stellar_token');

            // Role-based Access Control UI
            if(rolesStr) {
                try {
                    const roles = JSON.parse(rolesStr);
                    const createEventNav = document.getElementById('createEventNav');
                    const revenueNav = document.getElementById('revenueNav');
                    const adminNav = document.getElementById('adminNav');
                    const myTicketsNav = document.getElementById('myTicketsNav');

                    if(myTicketsNav) myTicketsNav.style.display = 'inline-flex';

                    if(createEventNav && (roles.includes('ROLE_ORGANIZER') || roles.includes('ROLE_ADMIN'))) {
                        createEventNav.style.display = 'inline-flex';
                    }
                    if(revenueNav && (roles.includes('ROLE_ORGANIZER') || roles.includes('ROLE_ADMIN'))) {
                        revenueNav.style.display = 'inline-flex';
                    }
                    if(adminNav && roles.includes('ROLE_ADMIN')) {
                        adminNav.style.display = 'inline-flex';
                    }
                } catch(e) {}
            }

            // Đồng bộ UI Header (Username & Dropdown)
            const authBtn = document.getElementById('authBtn');
            const accountDropdown = document.getElementById('accountDropdown');
            const userNameLabel = document.getElementById('userNameDropdown');

            if (currentUser && accountDropdown) {
                if (authBtn) authBtn.style.display = 'none';
                accountDropdown.style.display = 'inline-block';
                if (userNameLabel) {
                    try {
                        const userData = JSON.parse(currentUser);
                        userNameLabel.textContent = userData.hoTen || userData.name || currentUser;
                    } catch(e) {
                        userNameLabel.textContent = currentUser;
                    }
                }
            }


            if (!token) {
                window.location.href = 'auth.html';
                return;
            }

            let roles = [];
            try { roles = JSON.parse(rolesStr || '[]'); } catch(e) {}

            if (!roles.includes('ROLE_ADMIN')) {
                alert('Truy cập bị từ chối. Chỉ dành cho Quản Trị Viên (Admin).');
                window.location.href = 'index.html';
                return;
            }

            // Kích hoạt hiệu ứng fade-up cho các section (vì trang này không dùng script.js chung)
            initScrollReveal();

            loadPendingEvents(token);
            loadApprovedEvents(token);
        });

        // Scroll Reveal Animation — cần thiết vì trang này không import script.js
        function initScrollReveal() {
            const revealEls = document.querySelectorAll('.fade-up');
            const observer = new IntersectionObserver((entries) => {
                entries.forEach(entry => {
                    if (entry.isIntersecting) {
                        entry.target.classList.add('visible');
                        observer.unobserve(entry.target);
                    }
                });
            }, { threshold: 0.05, rootMargin: '0px 0px -30px 0px' });
            revealEls.forEach(el => observer.observe(el));
        }


        async function loadPendingEvents(token) {
            const grid = document.getElementById('approvalGrid');
            try {
                const res = await fetch('http://localhost:8081/api/admin/pending-events', {
                    headers: { 'Authorization': 'Bearer ' + token }
                });

                if (res.status === 403 || res.status === 401) {
                    alert('Phiên đăng nhập hết hạn hoặc không đủ quyền.');
                    window.location.href = 'auth.html';
                    return;
                }

                if (!res.ok) {
                    let errMsg = `Lỗi server (${res.status})`;
                    try { const errData = await res.json(); errMsg = errData.message || errMsg; } catch(_) {}
                    grid.innerHTML = `
                        <div class="empty-state" style="grid-column: 1/-1;">
                            <div class="empty-icon">⚠️</div>
                            <h3>Lỗi tải dữ liệu</h3>
                            <p>${errMsg}</p>
                        </div>`;
                    document.getElementById('pendingCountText').textContent = 'Không thể tải';
                    return;
                }

                const events = await res.json();
                renderPendingEvents(events);
            } catch (e) {
                console.error('Lỗi tải sự kiện:', e);
                grid.innerHTML = `
                    <div class="empty-state" style="grid-column: 1/-1;">
                        <div class="empty-icon">⚠️</div>
                        <h3>Không thể kết nối Backend</h3>
                        <p>Hệ thống đang bảo trì. Vui lòng thử lại sau.</p>
                    </div>`;
                document.getElementById('pendingCountText').textContent = 'Không thể tải';
            }
        }

        function renderPendingEvents(events) {
            const grid = document.getElementById('approvalGrid');
            const countText = document.getElementById('pendingCountText');

            if (!events || events.length === 0) {
                grid.innerHTML = `
                    <div class="empty-state" style="grid-column: 1/-1;">
                        <div class="empty-icon">🎉</div>
                        <h3>Tất cả đã được xử lý!</h3>
                        <p>Không có sự kiện nào đang chờ phê duyệt. Tuyệt vời!</p>
                    </div>`;
                countText.textContent = '0 sự kiện chờ duyệt';
                return;
            }

            countText.textContent = `${events.length} sự kiện chờ duyệt`;
            grid.innerHTML = '';

            events.forEach((ev, idx) => {
                const card = document.createElement('div');
                card.className = 'event-card admin-view';
                card.style.animationDelay = `${idx * 0.1}s`;
                card.id = `event-card-${ev.maSuKien}`;

                const dateStr = ev.thoiGianBD 
                    ? new Date(ev.thoiGianBD).toLocaleDateString('vi-VN', { day: '2-digit', month: '2-digit', year: 'numeric', hour: '2-digit', minute: '2-digit' })
                    : 'Chưa xác định';

                card.innerHTML = `
                    <div class="status-overlay" id="overlay-${ev.maSuKien}">
                        <div class="status-msg" id="msg-${ev.maSuKien}"></div>
                    </div>
                    <div class="card-image" style="background-image: url('${ev.anhThumbnailUrl || ev.anhBiaUrl || 'https://via.placeholder.com/400x225?text=No+Thumbnail'}');">
                        <div class="status-badge alert">CHỜ DUYỆT</div>
                    </div>
                    <div class="card-body">
                        <h3>${ev.tenSuKien}</h3>
                        
                        <div class="card-meta-grid">
                            <div class="meta-item">
                                <span class="meta-label">Thời gian</span>
                                <span class="meta-value">${dateStr}</span>
                            </div>
                            <div class="meta-item">
                                <span class="meta-label">Địa điểm</span>
                                <span class="meta-value">${ev.diaDiem || 'Chưa cập nhật'}</span>
                            </div>
                            <div class="meta-item">
                                <span class="meta-label">Phân loại</span>
                                <span class="meta-value">${ev.phanLoai || 'Chưa phân loại'}</span>
                            </div>
                            <div class="meta-item">
                                <span class="meta-label">ID Sự kiện</span>
                                <span class="meta-value">#${ev.maSuKien}</span>
                            </div>
                        </div>

                        <div class="admin-description">
                            ${ev.moTa ? ev.moTa : '<i>Không có mô tả chi tiết cho sự kiện này.</i>'}
                        </div>

                        <div class="organizer-info">
                            <div class="organizer-avatar">${(ev.nguoiTao || 'U').charAt(0).toUpperCase()}</div>
                            <div class="organizer-name">${ev.nguoiTao || 'Người dùng ẩn danh'}</div>
                        </div>

                        <div class="card-actions">
                            <button class="admin-btn btn-approve" onclick="approveEvent(${ev.maSuKien})">
                                <i class="fa fa-check-circle"></i> Duyệt
                            </button>
                            <button class="admin-btn btn-reject" onclick="rejectEvent(${ev.maSuKien})">
                                <i class="fa fa-times-circle"></i> Từ chối
                            </button>
                            <a href="admin-create.html?id=${ev.maSuKien}" class="admin-btn btn-edit" style="text-decoration:none;">
                                <i class="fa fa-edit"></i> Sửa
                            </a>
                            <button class="admin-btn btn-delete" onclick="deleteEvent(${ev.maSuKien})">
                                <i class="fa fa-trash"></i> Xóa
                            </button>
                        </div>
                    </div>
                `;
                grid.appendChild(card);
            });

            // Attach cursor events
            attachCursorEvents(document.querySelectorAll('.action-btn, a, .btn'));
        }

        async function approveEvent(id) {
            const token = localStorage.getItem('stellar_token');
            try {
                const res = await fetch(`http://localhost:8081/api/admin/approve-event/${id}`, {
                    method: 'PUT',
                    headers: { 'Authorization': 'Bearer ' + token }
                });
                const data = await res.json();
                if (res.ok) {
                    showToast(data.message || 'Phê duyệt thành công!', 'success');
                    markCardProcessed(id, 'approved');
                } else {
                    showToast(data.message || 'Có lỗi xảy ra.', 'error');
                }
            } catch (e) {
                showToast('Lỗi kết nối. Thử lại sau.', 'error');
            }
        }

        async function rejectEvent(id) {
            const token = localStorage.getItem('stellar_token');
            try {
                const res = await fetch(`http://localhost:8081/api/admin/reject-event/${id}`, {
                    method: 'PUT',
                    headers: { 'Authorization': 'Bearer ' + token }
                });
                const data = await res.json();
                if (res.ok) {
                    showToast(data.message || 'Đã từ chối sự kiện.', 'success');
                    markCardProcessed(id, 'rejected');
                } else {
                    showToast(data.message || 'Có lỗi xảy ra.', 'error');
                }
            } catch (e) {
                showToast('Lỗi kết nối. Thử lại sau.', 'error');
            }
        }

        async function deleteEvent(id) {
            if (!confirm("⚠️ BẠN CÓ CHẮC CHẮN MUỐN XÓA VĨNH VIỄN SỰ KIỆN NÀY?\nToàn bộ dữ liệu Lịch diễn, Hạng vé và Khu vực sẽ bị xóa sạch.")) {
                return;
            }

            const token = localStorage.getItem('stellar_token');
            try {
                const res = await fetch(`http://localhost:8081/api/admin/events/${id}`, {
                    method: 'DELETE',
                    headers: { 'Authorization': 'Bearer ' + token }
                });
                const data = await res.json();
                if (res.ok) {
                    showToast(data.message || 'Đã xóa sự kiện thành công.', 'success');
                    // Xóa card khỏi UI
                    const card = document.getElementById(`event-card-${id}`);
                    if (card) {
                        card.style.opacity = '0';
                        card.style.transform = 'scale(0.8)';
                        setTimeout(() => {
                            card.remove();
                            // Cập nhật số lượng
                            const remaining = document.querySelectorAll('.approval-card:not(.processed)').length;
                            document.getElementById('pendingCountText').textContent = `${remaining} sự kiện chờ duyệt`;
                        }, 400);
                    } else {
                        // Nếu ở Feature Grid thì reload
                        loadApprovedEvents(token);
                    }
                } else {
                    showToast(data.message || 'Lỗi khi xóa sự kiện.', 'error');
                }
            } catch (e) {
                showToast('Lỗi kết nối khi xóa sự kiện.', 'error');
            }
        }

        function markCardProcessed(id, action) {
            const card = document.getElementById(`event-card-${id}`);
            if (!card) return;
            card.classList.add('processed');

            const msg = document.getElementById(`msg-${id}`);
            if (action === 'approved') {
                msg.className = 'status-msg msg-approved';
                msg.innerHTML = '<i class="fa fa-check-circle"></i> ĐÃ PHÊ DUYỆT';
            } else {
                msg.className = 'status-msg msg-rejected';
                msg.innerHTML = '<i class="fa fa-times-circle"></i> ĐÃ TỪ CHỐI';
            }

            // Cập nhật số lượng chờ duyệt
            const remaining = document.querySelectorAll('#approvalGrid .event-card:not(.processed)').length;
            document.getElementById('pendingCountText').textContent = `${remaining} sự kiện chờ duyệt`;
        }

        /* === TÍNH NĂNG ĐẶT SỰ KIỆN NỔI BẬT === */
        async function loadApprovedEvents(token) {
            const grid = document.getElementById('featureGrid');
            try {
                const res = await fetch('http://localhost:8081/api/admin/approved-events', {
                    headers: { 'Authorization': 'Bearer ' + token }
                });

                if (res.status === 403 || res.status === 401) {
                    grid.innerHTML = `<div class="empty-state" style="grid-column: 1/-1;">
                        <div class="empty-icon">🔒</div>
                        <h3>Không có quyền truy cập</h3>
                    </div>`;
                    return;
                }

                if (!res.ok) {
                    let errMsg = `Lỗi server (${res.status})`;
                    try { const errData = await res.json(); errMsg = errData.message || errMsg; } catch(_) {}
                    grid.innerHTML = `<div class="empty-state" style="grid-column: 1/-1;">
                        <div class="empty-icon">⚠️</div>
                        <h3>Lỗi tải danh sách</h3>
                        <p>${errMsg}</p>
                    </div>`;
                    return;
                }

                const events = await res.json();
                renderApprovedEvents(events);
            } catch (e) {
                console.error('Lỗi tải sự kiện đã phê duyệt:', e);
                // Hiển thị empty state thay vì để spinner bị treo mãi
                grid.innerHTML = `<div class="empty-state" style="grid-column: 1/-1;">
                    <div class="empty-icon">⚠️</div>
                    <h3>Không thể kết nối Backend</h3>
                    <p>Hệ thống đang bảo trì. Vui lòng thử lại sau.</p>
                </div>`;
            }
        }

        function renderApprovedEvents(events) {
            const grid = document.getElementById('featureGrid');
            if (!events || events.length === 0) {
                grid.innerHTML = `<div class="empty-state" style="grid-column: 1/-1;">
                        <div class="empty-icon">🎟️</div>
                        <h3>Chưa có sự kiện khả dụng</h3>
                    </div>`;
                return;
            }

            grid.innerHTML = '';
            events.forEach((ev, idx) => {
                const card = document.createElement('div');
                card.className = 'event-card admin-view';
                card.style.animationDelay = `${idx * 0.1}s`;

                // Nếu đang là sự kiện nổi bật, add một border đặc biệt
                if (ev.laSuKienNoiBat) {
                    card.style.borderColor = 'var(--accent-secondary)';
                    card.style.boxShadow = '0 0 30px rgba(0, 229, 255, 0.2)';
                }

                const dateStr = ev.thoiGianBD ? new Date(ev.thoiGianBD).toLocaleDateString('vi-VN') : 'Chưa xác định';
                
                card.innerHTML = `
                    <div class="card-image" style="background-image: url('${ev.anhThumbnailUrl || ev.anhBiaUrl || 'https://images.unsplash.com/photo-1514525253161-7a46d19cd819?w=600'}');">
                        <div class="status-badge live" style="${ev.laSuKienNoiBat ? 'border-color: #fff; background: var(--accent-secondary); color: #000;' : ''}">
                            ${ev.laSuKienNoiBat ? '⭐ HIỆN NỔI BẬT' : 'CHỜ DUYỆT'}
                        </div>
                    </div>
                    <div class="card-body">
                        <h3>${ev.tenSuKien}</h3>
                        <div class="card-meta-grid">
                            <div class="meta-item">
                                <span class="meta-label">Thời gian</span>
                                <span class="meta-value">${dateStr}</span>
                            </div>
                            <div class="meta-item">
                                <span class="meta-label">Địa điểm</span>
                                <span class="meta-value">${ev.diaDiem || 'Chưa cập nhật'}</span>
                            </div>
                        </div>
                        <div class="card-actions">
                            <button class="admin-btn btn-feature" onclick="setFeatured(${ev.maSuKien})" ${ev.laSuKienNoiBat ? 'disabled' : ''}>
                                <i class="fa fa-star"></i> ${ev.laSuKienNoiBat ? 'Đang Nổi Bật' : 'Đặt làm Nổi bật'}
                            </button>
                            <a href="admin-create.html?id=${ev.maSuKien}" class="admin-btn btn-edit" style="text-decoration:none;">
                                <i class="fa fa-edit"></i> Chỉnh sửa
                            </a>
                            <button class="admin-btn btn-delete" onclick="deleteEvent(${ev.maSuKien})">
                                <i class="fa fa-trash"></i> Xóa bỏ
                            </button>
                        </div>
                    </div>
                `;
                grid.appendChild(card);
            });
            attachCursorEvents(grid.querySelectorAll('.action-btn'));
        }

        async function setFeatured(id) {
            const token = localStorage.getItem('stellar_token');
            try {
                const res = await fetch(`http://localhost:8081/api/admin/events/${id}/feature`, {
                    method: 'PUT',
                    headers: { 'Authorization': 'Bearer ' + token }
                });
                const data = await res.json();
                if (res.ok) {
                    showToast(data.message || 'Đã cài đặt sự kiện nổi bật!', 'success');
                    // Tải lại list để refresh UI
                    loadApprovedEvents(token);
                } else {
                    showToast(data.message || 'Có lỗi xảy ra.', 'error');
                }
            } catch (e) {
                showToast('Lỗi kết nối. Thử lại sau.', 'error');
            }
        }

        document.addEventListener('DOMContentLoaded', () => {
             // Sync Auth UI additionally if needed
        });
    </script>
    <!-- Mascot Companion -->
    <div class="mascot-companion" id="mascotCompanion">
        <div class="mascot-tooltip" id="mascotTooltip">Đang tải lời chào...</div>
        <img src="assets/mascot.png" alt="Stellar Mascot">
    </div>
    <script src="js/script.js"></script>
</body>

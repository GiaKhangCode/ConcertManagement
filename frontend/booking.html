<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sân Khấu & Đặt Vé | Ve'ryGood</title>
    <link href="https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:wght@300;400;500;600&family=Unbounded:wght@600;700;800&family=Space+Mono&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="css/style.css">
    <link rel="icon" type="image/png" href="assets/test.png">
    <style>
        body {
            background: var(--bg-dark);
            color: #fff;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 40px 20px;
            box-sizing: border-box;
            overflow-x: hidden;
            font-family: 'Be Vietnam Pro', sans-serif;
        }

        .booking-page-container {
            width: 100%;
            max-width: 1000px;
            background: rgba(20, 25, 40, 0.7);
            border: 1px solid rgba(0, 243, 255, 0.2);
            border-radius: 24px;
            box-shadow: 0 0 50px rgba(0, 243, 255, 0.05);
            backdrop-filter: blur(20px);
            z-index: 10;
            position: relative;
            display: grid;
            grid-template-columns: 1fr 400px;
            overflow: hidden;
        }

        /* Vùng bản đồ sân khấu tĩnh */
        .stage-map {
            padding: 40px;
            border-right: 1px solid rgba(255, 255, 255, 0.1);
            display: flex;
            flex-direction: column;
            align-items: center;
            background: linear-gradient(180deg, rgba(0, 243, 255, 0.05), transparent);
        }

        .stage-box {
            width: 80%;
            height: 100px;
            background: linear-gradient(90deg, var(--primary-purple), var(--primary-cyan));
            border-radius: 10px;
            transform: perspective(600px) rotateX(20deg);
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Unbounded', sans-serif;
            font-size: 1.5rem;
            margin-bottom: 50px;
            box-shadow: 0 20px 50px rgba(0, 243, 255, 0.3);
            letter-spacing: 5px;
        }

        .zone-mock {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            width: 100%;
        }

        .zone-card {
            background: rgba(255, 255, 255, 0.05);
            border: 1px dashed rgba(255, 255, 255, 0.2);
            padding: 20px;
            border-radius: 15px;
            text-align: center;
            font-size: 0.9rem;
            color: #a0a5b5;
            transition: all 0.3s;
        }
        
        .zone-card.selected {
            border-color: var(--primary-cyan);
            background: rgba(0, 243, 255, 0.1);
            color: var(--primary-cyan);
            box-shadow: 0 0 20px rgba(0, 243, 255, 0.2);
        }

        /* Khu form booking */
        .booking-details {
            padding: 40px;
            display: flex;
            flex-direction: column;
        }

        .booking-title {
            font-family: 'Unbounded', sans-serif;
            font-size: 1.8rem;
            margin-bottom: 10px;
            background: linear-gradient(90deg, #fff, var(--primary-cyan));
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .tier-label {
            display: inline-block;
            background: rgba(188, 0, 255, 0.2);
            border: 1px solid var(--primary-purple);
            padding: 5px 15px;
            border-radius: 20px;
            font-size: 0.85rem;
            color: #eab8ff;
            margin-bottom: 30px;
            width: fit-content;
        }

        .booking-box {
            background: rgba(0, 0, 0, 0.2);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 15px;
            padding: 20px;
            margin-bottom: 20px;
        }

        .booking-box h3 {
            font-size: 0.9rem;
            color: #a0a5b5;
            margin-bottom: 15px;
            text-transform: uppercase;
            letter-spacing: 1px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .form-input {
            width: 100%;
            background: rgba(0, 0, 0, 0.4);
            border: 1px solid rgba(255, 255, 255, 0.2);
            color: #fff;
            padding: 12px 15px;
            border-radius: 10px;
            font-family: inherit;
            outline: none;
            transition: border-color 0.3s;
        }

        .form-input:focus {
            border-color: var(--primary-cyan);
        }

        .price-total-box {
            margin-top: auto;
            padding-top: 20px;
            border-top: 1px dashed rgba(255, 255, 255, 0.1);
        }

        .price-total-label {
            color: #a0a5b5;
            font-size: 0.9rem;
            margin-bottom: 5px;
        }

        .price-total-value {
            font-family: 'Unbounded', sans-serif;
            font-size: 1.8rem;
            color: var(--primary-cyan);
        }

        .checkout-btn {
            width: 100%;
            padding: 18px;
            background: linear-gradient(90deg, var(--primary-purple), var(--primary-cyan));
            border: none;
            border-radius: 15px;
            color: white;
            font-weight: bold;
            font-family: 'Unbounded', sans-serif;
            font-size: 1.1rem;
            cursor: pointer;
            transition: all 0.3s;
            margin-top: 25px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        .checkout-btn:hover:not(:disabled) {
            transform: translateY(-3px);
            box-shadow: 0 10px 30px rgba(0, 243, 255, 0.4);
        }

        .checkout-btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }

        .back-home {
            position: absolute;
            top: 25px;
            left: 30px;
            color: #a0a5b5;
            text-decoration: none;
            z-index: 20;
            display: flex;
            align-items: center;
            gap: 10px;
            transition: color 0.3s;
        }
        
        .back-home:hover { color: var(--primary-cyan); }

        .wallet-info {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px 15px;
            background: rgba(0, 243, 255, 0.05);
            border: 1px solid rgba(0, 243, 255, 0.2);
            border-radius: 10px;
            margin-top: 10px;
        }

        @media (max-width: 850px) {
            .booking-page-container { grid-template-columns: 1fr; max-height: none; }
            .stage-map { border-right: none; border-bottom: 1px solid rgba(255,255,255,0.1); }
        }
    </style>
</head>
<body>
    <div class="custom-cursor"></div>
    <div class="bg-mesh primary-mesh"></div>
    <div class="bg-mesh secondary-mesh"></div>

    <a href="#" onclick="window.history.back(); return false;" class="back-home"><i class="fa fa-arrow-left"></i> Quay lại</a>

    <div class="booking-page-container">
        <!-- Cột Trái: Sơ đồ Sân khấu -->
        <div class="stage-map">
            <div class="stage-box">MAIN STAGE</div>
            <div id="stageZoneList" class="zone-mock">
                <!-- Khu vực sẽ được JS render -->
                <p style="grid-column: 1/-1; color: #a0a5b5; text-align: center;">Đang tải sơ đồ...</p>
            </div>
        </div>

        <!-- Cột Phải: Thông tin đặt vé -->
        <div class="booking-details">
            <h1 class="booking-title">ĐẶT VÉ</h1>
            <div class="tier-label" id="lblTierName">Đang tải...</div>

            <div class="booking-box">
                <h3><i class="fa fa-ticket-alt"></i> SỐ LƯỢNG VÉ</h3>
                <input type="number" id="ticketQuantity" value="1" min="1" max="10" class="form-input" onchange="updateUIPrice()">
                <div style="font-size: 0.75rem; color: #a0a5b5; margin-top: 8px;">(Tối đa 10 vé / giao dịch)</div>
            </div>

            <div class="booking-box">
                <h3><i class="fa fa-map-marked-alt"></i> CHỌN KHU VỰC</h3>
                <select id="zoneSelect" class="form-input" onchange="syncZoneSelection()">
                    <!-- Options loaded via JS -->
                </select>
            </div>

            <div class="booking-box" style="border-color: rgba(0, 243, 255, 0.3);">
                <h3><i class="fa fa-wallet"></i> THANH TOÁN QUA VÍ</h3>
                <div class="wallet-info">
                    <span style="color: #a0a5b5; font-size: 0.85rem;">SỐ DƯ HIỆN TẠI:</span>
                    <span id="userWalletBalance" style="font-family: 'Space Mono', monospace; font-weight: bold; color: var(--primary-cyan);">--- VNĐ</span>
                </div>
            </div>

            <div class="price-total-box">
                <div class="price-total-label">TỔNG CỘNG THANH TOÁN</div>
                <div class="price-total-value" id="lblTotalPrice">0 VNĐ</div>
                <button class="checkout-btn" id="confirmBookingBtn" onclick="submitBooking()">
                    XÁC NHẬN ĐẶT VÉ <i class="fa fa-chevron-right"></i>
                </button>
            </div>
        </div>
    </div>

    <script>
        // Custom cursor logic
        const cursor = document.querySelector('.custom-cursor');
        document.addEventListener('mousemove', (e) => {
            cursor.style.left = e.clientX + 'px';
            cursor.style.top = e.clientY + 'px';
        });

        // URL Parameters
        const urlParams = new URLSearchParams(window.location.search);
        const eventId = urlParams.get('eventId');
        const tierId = urlParams.get('tierId');
        const tierName = urlParams.get('tierName');

        let unitPrice = 0;
        let userBalance = 0;

        document.getElementById('lblTierName').innerText = tierName ? `Hạng: ${tierName}` : "Hạng vé";

        async function initData() {
            const token = localStorage.getItem('stellar_token');
            if(!token) {
                alert("Vui lòng đăng nhập để tiếp tục!");
                window.location.href = 'auth.html';
                return;
            }

            try {
                // 1. Lấy thông tin Ví
                const profRes = await fetch('http://localhost:8081/api/user/profile', {
                    headers: { 'Authorization': 'Bearer ' + token }
                });
                if(profRes.ok) {
                    const profile = await profRes.json();
                    userBalance = profile.walletBalance || 0;
                    document.getElementById('userWalletBalance').innerText = userBalance.toLocaleString('vi-VN') + " VNĐ";
                }

                // 2. Lấy thông tin Sự kiện & Khu vực
                const response = await fetch(`http://localhost:8081/api/events/${eventId}`);
                const ev = await response.json();
                const matchedTier = ev.ticketTiers.find(t => t.id == tierId);
                
                if(matchedTier) {
                    unitPrice = matchedTier.price;
                    renderZones(matchedTier.khuVucList);
                    updateUIPrice();
                } else {
                    alert("Không tìm thấy thông tin hạng vé này.");
                }

            } catch(e) {
                console.error("Lỗi khởi tạo:", e);
                document.getElementById('userWalletBalance').innerText = "Lỗi kết nối";
            }
        }

        function renderZones(khuVucList) {
            const select = document.getElementById('zoneSelect');
            const stageList = document.getElementById('stageZoneList');

            if (!khuVucList || khuVucList.length === 0) {
                select.innerHTML = '<option value="">Mặc định</option>';
                stageList.innerHTML = '<div class="zone-card selected">Sân khấu mặc định</div>';
                return;
            }

            let selectHtml = '';
            let stageHtml = '';

            khuVucList.forEach((kv, index) => {
                const isFirst = index === 0;
                selectHtml += `<option value="${kv.name}">${kv.name} (Sức chứa: ${kv.capacity})</option>`;
                stageHtml += `
                    <div class="zone-card ${isFirst ? 'selected' : ''}" data-zone="${kv.name}">
                        ${kv.name}<br>
                        <small style="opacity: 0.6; font-size: 0.7rem;">SỨC CHỨA: ${kv.capacity}</small>
                    </div>
                `;
            });

            select.innerHTML = selectHtml;
            stageList.innerHTML = stageHtml;
        }

        function syncZoneSelection() {
            const selectedZone = document.getElementById('zoneSelect').value;
            document.querySelectorAll('.zone-card').forEach(card => {
                if (card.dataset.zone === selectedZone) {
                    card.classList.add('selected');
                } else {
                    card.classList.remove('selected');
                }
            });
        }

        function updateUIPrice() {
            const qty = parseInt(document.getElementById('ticketQuantity').value) || 1;
            const total = qty * unitPrice;
            document.getElementById('lblTotalPrice').innerText = total.toLocaleString('vi-VN') + " VNĐ";
            
            // Highlight nếu không đủ tiền
            const totalEl = document.getElementById('lblTotalPrice');
            if (total > userBalance) {
                totalEl.style.color = '#ff4d4d';
            } else {
                totalEl.style.color = 'var(--primary-cyan)';
            }
        }

        async function submitBooking() {
            const token = localStorage.getItem('stellar_token');
            const qty = parseInt(document.getElementById('ticketQuantity').value);

            if (qty * unitPrice > userBalance) {
                alert("Số dư trong ví của bạn không đủ để thực hiện giao dịch này. Vui lòng nạp thêm!");
                return;
            }

            const btn = document.getElementById('confirmBookingBtn');
            btn.innerHTML = '<i class="fa fa-spinner fa-spin"></i> ĐANG XỬ LÝ...';
            btn.disabled = true;

            try {
                const response = await fetch('http://localhost:8081/api/booking/create', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': 'Bearer ' + token
                    },
                    body: JSON.stringify({ 
                        maSuKien: parseInt(eventId), 
                        maHangVe: parseInt(tierId), 
                        soLuong: qty 
                    })
                });

                const data = await response.json();
                
                if(response.ok) {
                    window.location.href = `checkout.html?invoiceId=${data.invoiceId}&tickets=${data.totalTickets}`;
                } else {
                    alert("❌ Thất bại: " + (data.message || 'Hủy giao dịch.'));
                    btn.innerHTML = 'XÁC NHẬN ĐẶT VÉ <i class="fa fa-chevron-right"></i>';
                    btn.disabled = false;
                }
            } catch(err) {
                alert("⚠️ Lỗi hệ thống. Vui lòng thử lại sau.");
                btn.innerHTML = 'XÁC NHẬN ĐẶT VÉ <i class="fa fa-chevron-right"></i>';
                btn.disabled = false;
            }
        }

        // Khởi tạo
        if(eventId && tierId) initData();
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hồ Sơ Cá Nhân | Ve'ryGood</title>
    <link href="https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:wght@300;400;500;600&family=Unbounded:wght@600;700;800&family=Space+Mono&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="css/style.css">
    <style>
        body { padding-top: 100px; background: var(--bg-color); color: #fff; min-height: 100vh; overflow-x: hidden; }
        
        .profile-container {
            max-width: 1100px;
            margin: 0 auto;
            padding: 20px;
            display: grid;
            grid-template-columns: 350px 1fr;
            gap: 30px;
            position: relative;
            z-index: 10;
        }

        .profile-sidebar {
            background: rgba(20, 25, 40, 0.7);
            border: 1px solid rgba(0, 243, 255, 0.2);
            border-radius: 24px;
            padding: 30px;
            backdrop-filter: blur(20px);
            text-align: center;
            height: fit-content;
        }

        .avatar-glow {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            background: linear-gradient(45deg, var(--primary-purple), var(--primary-cyan));
            margin: 0 auto 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 3rem;
            box-shadow: 0 0 30px rgba(0, 243, 255, 0.3);
        }

        .user-name { font-family: 'Unbounded', sans-serif; font-size: 1.5rem; margin-bottom: 5px; }
        .user-role { color: var(--primary-cyan); font-size: 0.9rem; margin-bottom: 20px; display: inline-block; padding: 5px 15px; border: 1px solid var(--primary-cyan); border-radius: 30px; }

        .wallet-card {
            background: linear-gradient(135deg, rgba(188, 0, 255, 0.2), rgba(0, 243, 255, 0.1));
            border-radius: 15px;
            padding: 20px;
            margin-top: 30px;
            border: 1px dashed rgba(255, 255, 255, 0.2);
        }

        .wallet-card h3 { font-size: 1rem; color: #a0a5b5; margin-bottom: 10px; }
        .wallet-balance { font-family: 'Space Mono', monospace; font-size: 2rem; color: #fff; text-shadow: 0 0 10px var(--primary-cyan); }

        .profile-main {
            background: rgba(20, 25, 40, 0.7);
            border: 1px solid rgba(0, 243, 255, 0.2);
            border-radius: 24px;
            padding: 30px;
            backdrop-filter: blur(20px);
        }

        .section-title { font-family: 'Unbounded', sans-serif; font-size: 1.5rem; margin-bottom: 20px; border-bottom: 1px solid rgba(255,255,255,0.1); padding-bottom: 15px; }

        .ticket-list { display: flex; flex-direction: column; gap: 15px; }

        .ticket-item {
            background: rgba(0, 0, 0, 0.3);
            border-left: 4px solid var(--primary-cyan);
            padding: 20px;
            border-radius: 10px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            transition: transform 0.3s, background 0.3s;
        }

        .ticket-item:hover {
            transform: translateX(10px);
            background: rgba(0, 243, 255, 0.05);
        }

        .ticket-item h4 { font-family: 'Unbounded', sans-serif; color: #fff; margin-bottom: 8px; font-size: 1.1rem; }
        .ticket-meta { color: #a0a5b5; font-size: 0.9rem; }
        .ticket-meta span { margin-right: 15px; }
        .ticket-meta i { color: var(--primary-cyan); margin-right: 5px; }

        .ticket-status { background: rgba(16, 185, 129, 0.2); color: #10b981; padding: 5px 15px; border-radius: 30px; font-size: 0.85rem; border: 1px solid #10b981; }

        @keyframes btn-pulse {
            0% { box-shadow: 0 0 0 0 rgba(0, 243, 255, 0.4); }
            70% { box-shadow: 0 0 0 15px rgba(0, 243, 255, 0); }
            100% { box-shadow: 0 0 0 0 rgba(0, 243, 255, 0); }
        }

        #topUpBtn {
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            position: relative;
            overflow: hidden;
        }

        #topUpBtn:hover {
            background: var(--primary-cyan) !important;
            color: #000 !important;
            transform: scale(1.02);
            animation: btn-pulse 1.5s infinite;
        }

        #topUpBtn::after {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: linear-gradient(45deg, transparent, rgba(255,255,255,0.1), transparent);
            transform: rotate(45deg);
            transition: 0.5s;
            opacity: 0;
        }

        #topUpBtn:hover::after {
            left: 100%;
            opacity: 1;
        }

        @media (max-width: 800px) {
            .profile-container { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body style="min-height: 100vh; overflow-x: hidden; background: var(--bg-color); font-family: 'Be Vietnam Pro', sans-serif;">
    <div class="custom-cursor"></div>
    <div class="bg-mesh primary-mesh"></div>
    
    <header class="navbar">
        <a href="index.html" style="text-decoration:none; color:inherit;"><div class="logo">Ve'ry<span class="neon-text">Good</span></div></a>
        <div class="nav-links">
            <a href="index.html" class="nav-btn active"><i class="fa fa-home"></i> Trang Chủ</a>
            <a href="profile.html" style="display:none;" id="myTicketsNav" class="nav-btn"><i class="fa fa-ticket-alt"></i> Vé của tôi</a>
            <a href="admin-approval.html" style="display:none;" id="adminNav" class="nav-btn"><i class="fa fa-shield-alt"></i> Duyệt Sự Kiện</a>
            <a href="event-management.html" style="display:none;" id="revenueNav" class="nav-btn"><i class="fa fa-chart-line"></i> Quản Lý Sự Kiện</a>
            <a href="admin-create.html" style="display:none;" id="createEventNav" class="nav-btn"><i class="fa fa-plus-circle"></i> Tạo Sự Kiện</a>
            <a href="#" class="btn btn-outline small" onclick="logout()" style="background: rgba(255,0,0,0.1); border-color: rgba(255,0,0,0.3); color: #ff3366;"><i class="fa fa-power-off"></i> Đăng Xuất</a>
        </div>
    </header>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const rolesStr = localStorage.getItem('stellar_roles');
            if(rolesStr) {
                try {
                    const roles = JSON.parse(rolesStr);
                    const createEventNav = document.getElementById('createEventNav');
                    const revenueNav = document.getElementById('revenueNav');
                    const adminNav = document.getElementById('adminNav');
                    const myTicketsNav = document.getElementById('myTicketsNav');

                    if(myTicketsNav) myTicketsNav.style.display = 'inline-flex';

                    if(createEventNav && (roles.includes('ROLE_ORGANIZER') || roles.includes('ROLE_ADMIN'))) {
                        createEventNav.style.display = 'inline-flex';
                    }
                    if(revenueNav && (roles.includes('ROLE_ORGANIZER') || roles.includes('ROLE_ADMIN'))) {
                        revenueNav.style.display = 'inline-flex';
                    }
                    if(adminNav && roles.includes('ROLE_ADMIN')) {
                        adminNav.style.display = 'inline-flex';
                    }
                } catch(e) {}
            }
        });
    </script>

    <div class="profile-container">
        <!-- Sidebar -->
        <div class="profile-sidebar">
            <div class="avatar-glow"><i class="fa fa-user-circle"></i></div>
            <h2 class="user-name" id="userNameLabel">Đang tải dữ liệu...</h2>
            <div class="user-role" id="userEmailLabel">Đang kết nối API...</div>

            <div class="wallet-card">
                <h3>VÍ ĐIỆN TỬ CÁ NHÂN</h3>
                <div class="wallet-balance" id="walletBalance">0 VNĐ</div>
                <button id="topUpBtn" class="btn btn-outline" style="width:100%; margin-top:15px; font-size:0.85rem;"><i class="fa fa-plus"></i> NẠP TIỀN</button>
            </div>
        </div>

        <!-- Main Content -->
        <div class="profile-main">
            <h2 class="section-title">DANH SÁCH VÉ ĐÃ MUA</h2>
            <div class="ticket-list" id="ticketListCont">
                <p style="color:#a0a5b5; text-align:center;">Đang tải danh sách vé của bạn...</p>
            </div>
        </div>
    </div>

    <script src="js/profile.js"></script>
</body>
</html>

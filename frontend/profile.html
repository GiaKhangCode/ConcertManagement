<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hồ Sơ Cá Nhân | Ve'ryGood</title>
    <link href="https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:wght@300;400;500;600&family=Unbounded:wght@600;700;800&family=Space+Mono&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="css/style.css">
    <link rel="icon" type="image/png" href="assets/test.png">
    <style>
        /* Animation Fix */
        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .fade-up {
            animation: fadeUp 0.8s cubic-bezier(0.16, 1, 0.3, 1) forwards;
            opacity: 0;
        }

        body { margin: 0; background: var(--bg-dark); color: #fff; min-height: 100vh; overflow-x: hidden; }
        
        .profile-container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 40px 20px;
            display: grid;
            grid-template-columns: 350px 1fr;
            gap: 40px;
            position: relative;
            z-index: 10;
        }

        .profile-sidebar {
            background: rgba(20, 25, 40, 0.7);
            border: 1px solid rgba(0, 243, 255, 0.2);
            border-radius: 24px;
            padding: 40px 30px;
            backdrop-filter: blur(20px);
            text-align: center;
            height: fit-content;
            box-shadow: 0 20px 40px rgba(0,0,0,0.3);
        }

        .avatar-glow {
            width: 130px;
            height: 130px;
            border-radius: 50%;
            background: linear-gradient(45deg, var(--accent-primary), var(--accent-secondary));
            margin: 0 auto 25px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 3.5rem;
            box-shadow: 0 0 40px rgba(0, 229, 255, 0.3);
            position: relative;
        }

        .user-name { font-family: 'Unbounded', sans-serif; font-size: 1.6rem; margin-bottom: 8px; color: #fff; }
        .user-role { 
            color: var(--accent-secondary); 
            font-size: 0.85rem; 
            margin-bottom: 25px; 
            display: inline-block; 
            padding: 6px 18px; 
            border: 1px solid var(--accent-secondary); 
            border-radius: 30px;
            text-transform: uppercase;
            font-weight: 600;
            letter-spacing: 1px;
        }

        .wallet-card {
            background: linear-gradient(135deg, rgba(138, 43, 226, 0.15), rgba(0, 229, 255, 0.1));
            border-radius: 20px;
            padding: 25px;
            margin-top: 20px;
            border: 1px solid rgba(255, 255, 255, 0.05);
            text-align: left;
        }

        .wallet-card h3 { font-size: 0.85rem; color: var(--text-muted); margin-bottom: 15px; letter-spacing: 1px; text-transform: uppercase; }
        .wallet-balance { font-family: 'Space Mono', monospace; font-size: 1.8rem; color: #fff; text-shadow: 0 0 15px var(--accent-secondary); margin-bottom: 20px; }

        .profile-main {
            background: rgba(20, 25, 40, 0.7);
            border: 1px solid rgba(0, 243, 255, 0.15);
            border-radius: 24px;
            padding: 40px;
            backdrop-filter: blur(20px);
            box-shadow: 0 20px 50px rgba(0,0,0,0.4);
        }

        .section-title { 
            font-family: 'Unbounded', sans-serif; 
            font-size: 1.4rem; 
            margin-bottom: 30px; 
            border-bottom: 1px solid rgba(255,255,255,0.08); 
            padding-bottom: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .ticket-list { display: flex; flex-direction: column; gap: 20px; }

        .ticket-item {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-left: 4px solid var(--accent-secondary);
            padding: 25px;
            border-radius: 16px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .ticket-item:hover {
            transform: translateX(8px) scale(1.01);
            background: rgba(0, 229, 255, 0.06);
            border-color: rgba(0, 229, 255, 0.2);
        }

        .ticket-item h4 { font-family: 'Unbounded', sans-serif; color: #fff; margin-bottom: 12px; font-size: 1.1rem; line-height: 1.4; }
        .ticket-meta { display: flex; flex-wrap: wrap; gap: 20px; color: var(--text-muted); font-size: 0.85rem; }
        .ticket-meta span { display: flex; align-items: center; gap: 6px; }
        .ticket-meta i { color: var(--accent-secondary); }

        .ticket-status { 
            background: rgba(0, 255, 136, 0.1); 
            color: #00ff88; 
            padding: 8px 20px; 
            border-radius: 30px; 
            font-size: 0.8rem; 
            font-weight: 700;
            border: 1px solid rgba(0, 255, 136, 0.3);
            text-transform: uppercase;
        }

        @media (max-width: 950px) {
            .profile-container { grid-template-columns: 1fr; }
            .profile-sidebar { margin-bottom: 30px; }
        }

        @keyframes pulse {
            0% { transform: scale(1); opacity: 0.5; }
            50% { transform: scale(1.05); opacity: 0.8; }
            100% { transform: scale(1); opacity: 0.5; }
        }
    </style>
</head>
<body style="margin: 0; min-height: 100vh; overflow-x: hidden; background: var(--bg-dark); font-family: 'Be Vietnam Pro', sans-serif;">
    <div class="custom-cursor"></div>
    <div class="bg-mesh primary-mesh"></div>
    <div class="bg-mesh secondary-mesh"></div>
    
    <header class="navbar">
        <a href="index.html" style="text-decoration:none; color:inherit;"><div class="logo">Ve'ry<span class="neon-text">Good</span></div></a>
        <div class="nav-center">
            <div class="search-bar">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"></circle><line x1="21" y1="21" x2="16.65" y2="16.65"></line></svg>
                <input type="text" placeholder="Tìm kiếm sự kiện, nghệ sĩ, địa điểm..." id="searchInput">
            </div>
        </div>
        <div class="nav-links">
            <a href="index.html" class="nav-btn">Trang Chủ</a>
            <a href="admin-approval.html" style="display:none;" id="adminNav" class="nav-btn">Duyệt Sự Kiện</a>
            <a href="event-management.html" style="display:none;" id="revenueNav" class="nav-btn">Quản Lý Sự Kiện</a>
            <a href="admin-create.html" style="display:none;" id="createEventNav" class="nav-btn">Tạo Sự Kiện</a>
            
            <!-- Account Dropdown -->
            <div class="account-dropdown" id="accountDropdown" style="display:none;">
                <button class="btn btn-account active">
                    <i class="fa fa-user-circle"></i>
                    <span id="userNameDropdown">Tài khoản</span>
                    <i class="fa fa-chevron-down" style="font-size: 0.7rem; margin-left: 5px; opacity: 0.7;"></i>
                </button>
                <div class="dropdown-content">
                    <a href="profile.html" class="active"><i class="fa fa-ticket"></i> Vé của tôi</a>
                    <div class="dropdown-divider"></div>
                    <a href="#" onclick="logout()" class="logout-item"><i class="fa fa-sign-out-alt"></i> Đăng xuất</a>
                </div>
            </div>
            <a href="auth.html" class="btn btn-outline small" id="authBtn">Đăng Nhập</a>
        </div>
    </header>

    <div class="profile-container">
        <!-- Sidebar -->
        <aside class="profile-sidebar fade-up">
            <div class="avatar-glow">
                <i class="fa fa-user"></i>
            </div>
            <h2 class="user-name" id="userNameLabel">Khang</h2>
            <p id="userEmailLabel" style="color: var(--text-muted); font-size: 0.85rem; margin-bottom: 25px; opacity: 0.8;">đang tải email...</p>
            <span class="user-role" id="userRoleDis">Khách hàng</span>
            
            <div class="wallet-card">
                <h3>Ví điện tử cá nhân</h3>
                <div class="wallet-balance" id="walletBalance">0 VNĐ</div>
                <button class="btn btn-primary small" style="margin-top: 10px; width: 100%; letter-spacing: 1px;" id="topUpBtn">+ NẠP TIỀN</button>
            </div>
        </aside>

        <!-- Main Content -->
        <main class="profile-main fade-up" style="animation-delay: 0.15s;">
            <div class="section-title">
                <h2>LỊCH SỬ ĐẶT VÉ</h2>
                <span style="font-size: 0.9rem; color: var(--accent-secondary); font-family: 'Be Vietnam Pro', sans-serif; font-weight: 500;" id="ticketCount">0 vé</span>
            </div>
            <div class="ticket-list" id="ticketListCont">
                <!-- Data from profile.js -->
                <div style="text-align: center; padding: 40px; color: var(--text-muted);">
                    <i class="fa fa-spinner fa-spin fa-2x" style="margin-bottom: 20px; color: var(--accent-secondary);"></i>
                    <p>Đang tải danh sách vé từ hệ thống...</p>
                </div>
            </div>
        </main>
    </div>

    <div class="mascot-companion" id="mascotCompanion">
        <div class="mascot-tooltip" id="mascotTooltip">Đang tải lời chào...</div>
        <img src="assets/mascot.png" alt="Stellar Mascot">
    </div>

    <!-- Scripts -->
    <script src="js/script.js"></script>
    <script src="js/profile.js"></script>
</body>
</html>

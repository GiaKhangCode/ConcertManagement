<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quản lý Sự Kiện | Stellar Portal</title>
    <link href="https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:wght@300;400;500;600&family=Unbounded:wght@600;700;800&family=Space+Mono&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body style="min-height: 100vh; overflow-x: hidden; background: var(--bg-color); font-family: 'Be Vietnam Pro', sans-serif;">
    <div class="custom-cursor"></div>
    <div class="bg-mesh primary-mesh"></div>
    
    <nav class="navbar" style="border-bottom: 1px solid rgba(0, 243, 255, 0.2); background: rgba(10, 14, 23, 0.9); backdrop-filter: blur(10px);">
        <a href="index.html" class="logo">STELLAR <span class="neon-text">ADMIN</span></a>
        <div class="nav-links">
            <a href="index.html"><i class="fa fa-dashboard"></i> VỀ TRANG CHỦ</a>
        </div>
    </nav>

    <div class="admin-container" style="max-width: 1200px; margin: 100px auto 50px; padding: 0 20px; color: white;">
        <h1 style="font-family: 'Unbounded', sans-serif; margin-bottom: 30px; font-size: 2.2rem; background: linear-gradient(90deg, #fff, var(--primary-cyan)); -webkit-background-clip: text; -webkit-text-fill-color: transparent;">TẠO SỰ KIỆN MỚI</h1>
        
        <form id="createEventForm" style="background: rgba(20, 25, 40, 0.8); border: 1px solid var(--primary-cyan); padding: 40px; border-radius: 20px; box-shadow: 0 0 50px rgba(0,243,255,0.1); backdrop-filter: blur(20px);">
            
            <h3 style="color: var(--primary-cyan); border-bottom: 1px dashed rgba(255,255,255,0.2); padding-bottom: 10px; margin-bottom: 20px; font-family: 'Unbounded', sans-serif; font-size: 1.2rem;">
                <i class="fa fa-info-circle"></i> 1. THÔNG TIN CƠ BẢN
            </h3>
            
            <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 20px;">
                <div>
                    <label style="font-size: 0.9rem; color: #a0a5b5; margin-bottom: 8px; display: block;">Tên Sự Kiện</label>
                    <input type="text" id="tenSuKien" class="form-input" required placeholder="Nhập tên sự kiện...">
                </div>
                <div>
                    <label style="font-size: 0.9rem; color: #a0a5b5; margin-bottom: 8px; display: block;">Địa Điểm Tổ Chức</label>
                    <select id="maDiaDiem" class="form-input" required>
                        <option value="">-- Đang tải danh sách địa điểm... --</option>
                    </select>
                </div>
            </div>

            <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 20px;">
                <div>
                    <label style="font-size: 0.9rem; color: #a0a5b5; margin-bottom: 8px; display: block;">Thời Gian Mở Bán Vé</label>
                    <input type="datetime-local" id="thoiGianMoBanVe" class="form-input" required>
                </div>
                <div>
                    <label style="font-size: 0.9rem; color: #a0a5b5; margin-bottom: 8px; display: block;">Thời Gian Ngừng Bán Vé</label>
                    <input type="datetime-local" id="thoiGianNgungBanVe" class="form-input" required>
                </div>
            </div>

            <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 20px;">
                <div>
                    <label style="font-size: 0.9rem; color: #a0a5b5; margin-bottom: 8px; display: block;">Link Ảnh Bìa (Poster URL)</label>
                    <input type="text" id="anhBiaUrl" class="form-input" placeholder="https://unsplash.com/ảnh...">
                </div>
                <div>
                    <label style="font-size: 0.9rem; color: #a0a5b5; margin-bottom: 8px; display: block;">Phân Loại Sự Kiện</label>
                    <input type="text" id="phanLoai" class="form-input" placeholder="Ví dụ: Concert Âm Nhạc, Triển lãm...">
                </div>
            </div>

            <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 40px;">
                <div>
                    <label style="font-size: 0.9rem; color: #a0a5b5; margin-bottom: 8px; display: block;">Thời Gian Bắt Đầu Sự Kiện (Tổng quát)</label>
                    <input type="datetime-local" id="thoiGianBD" class="form-input" required>
                </div>
                <div>
                    <label style="font-size: 0.9rem; color: #a0a5b5; margin-bottom: 8px; display: block;">Thời Gian Kết Thúc Sự Kiện</label>
                    <input type="datetime-local" id="thoiGianKT" class="form-input" required>
                </div>
            </div>

            <h3 style="color: #eab8ff; border-bottom: 1px dashed rgba(255,255,255,0.2); padding-bottom: 10px; margin-bottom: 20px; font-family: 'Unbounded', sans-serif; font-size: 1.2rem; display: flex; justify-content: space-between; align-items: center;">
                <span><i class="fa fa-calendar-alt"></i> 2. QUẢN LÝ TỪNG BUỔI DIỄN / NGÀY DIỄN</span>
                <button type="button" class="btn btn-outline" style="padding: 8px 20px; font-size: 0.8rem; border-radius: 20px;" onclick="addLichDien()">+ THÊM LỊCH DIỄN</button>
            </h3>
            <div id="lichDienContainer" style="margin-bottom: 50px;"></div>


            <h3 style="color: #ffb86c; border-bottom: 1px dashed rgba(255,255,255,0.2); padding-bottom: 10px; margin-bottom: 20px; font-family: 'Unbounded', sans-serif; font-size: 1.2rem; display: flex; justify-content: space-between; align-items: center;">
                <span><i class="fa fa-ticket-alt"></i> 3. CẤU TRÚC HẠNG VÉ VÀ KHU VỰC</span>
                <button type="button" class="btn btn-outline" style="padding: 8px 20px; font-size: 0.8rem; border-radius: 20px; border-color: #ffb86c; color: #ffb86c;" onclick="addHangVe()">+ THÊM HẠNG VÉ</button>
            </h3>
            <div id="hangVeContainer" style="margin-bottom: 50px;"></div>

            <div style="text-align: center; margin-top: 40px; padding-top: 30px; border-top: 1px dashed rgba(255,255,255,0.1);">
                <button type="submit" class="btn btn-primary glow-btn" style="width: 100%; max-width: 600px; padding: 25px; font-size: 1.2rem; font-family: 'Unbounded', sans-serif;">
                    <i class="fa fa-check-circle" style="margin-right: 15px;"></i> XÁC NHẬN VÀ LƯU SỰ KIỆN
                </button>
            </div>
        </form>
    </div>

    <!-- Admin Form Styled UI -->
    <style>
        .form-input {
            width: 100%; padding: 15px 20px; background: rgba(0,0,0,0.6); border: 1px solid rgba(255,255,255,0.15); 
            border-radius: 12px; color: white; font-family: 'Be Vietnam Pro', sans-serif; font-size: 1rem;
            outline: none; transition: all 0.3s;
        }
        .form-input:focus { border-color: var(--primary-cyan); box-shadow: 0 0 15px rgba(0,243,255,0.2); }
        .dynamic-box {
            background: rgba(255,255,255,0.02); padding: 25px 30px; border-radius: 20px; margin-bottom: 25px;
            border-left: 5px solid var(--primary-purple); position: relative;
            box-shadow: inset 0 0 10px rgba(0,0,0,0.5);
            animation: fadeIn 0.4s ease-out;
        }
        @keyframes fadeIn { from { opacity:0; transform: translateY(-10px); } to { opacity:1; transform: translateY(0); } }
        .remove-btn {
            position: absolute; top: 20px; right: 25px; background: transparent; color: #ff5555;
            border: none; cursor: pointer; font-size: 1.5rem; transition: transform 0.2s;
        }
        .remove-btn:hover { transform: scale(1.2); }
        .sub-box {
            background: rgba(0,0,0,0.4); padding: 20px; border-radius: 15px; margin-top: 20px;
            border-left: 3px solid #ffb86c; animation: fadeIn 0.3s ease-out;
        }
    </style>

    <script src="admin-create.js"></script>
</body>
</html>
